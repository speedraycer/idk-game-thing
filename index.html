<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root { --g: #00ff41; --gd: #0a4018; --r: #ff2222; }
  html, body {
    height: 100%; background: #000; color: var(--g);
    font-family: "Courier New", ui-monospace, monospace;
    overflow: hidden; user-select: none; -webkit-user-select: none;
  }
  #matrix { position: fixed; inset: 0; z-index: 0; opacity: 0.35; }
  #app {
    position: fixed; inset: 0; z-index: 1; display: flex; flex-direction: column;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  .scan { position: fixed; inset: 0; z-index: 3; pointer-events: none;
    background: repeating-linear-gradient(0deg, rgba(0,0,0,0) 0, rgba(0,0,0,0) 2px, rgba(0,0,0,.25) 3px, rgba(0,0,0,0) 4px); }
  header {
    display: flex; align-items: center; gap: 8px; padding: 10px 14px;
    border-bottom: 1px solid var(--gd); background: rgba(0,10,0,.6); font-size: 13px;
    text-shadow: 0 0 6px var(--g); letter-spacing: 1px;
  }
  header .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--g); box-shadow: 0 0 8px var(--g); animation: blink 1.1s infinite; }
  header .sep { flex: 1; }
  @keyframes blink { 50% { opacity: .25; } }
  #term {
    flex: 1; overflow-y: auto; padding: 12px 14px; font-size: 13.5px; line-height: 1.45;
    white-space: pre-wrap; word-break: break-word; text-shadow: 0 0 5px rgba(0,255,65,.6);
  }
  #term .cmd { color: #fff; }
  #term .ok { color: var(--g); }
  #term .warn { color: #ffcc00; }
  #term .bad { color: var(--r); text-shadow: 0 0 6px var(--r); }
  #term .dim { color: #2c8f42; }
  .cursor { display: inline-block; width: 9px; height: 15px; background: var(--g);
    vertical-align: -2px; box-shadow: 0 0 8px var(--g); animation: blink .8s step-end infinite; }
  #pad {
    display: grid; grid-template-columns: 1fr; gap: 10px; padding: 12px 14px 18px;
    border-top: 1px solid var(--gd); background: rgba(0,10,0,.55);
  }
  button.op {
    appearance: none; background: rgba(0,40,10,.6); color: var(--g);
    border: 1px solid var(--g); border-radius: 6px; padding: 16px 8px;
    font-family: inherit; font-size: 15px; font-weight: bold; letter-spacing: .5px;
    text-shadow: 0 0 6px var(--g); box-shadow: 0 0 10px rgba(0,255,65,.15) inset; cursor: pointer;
    transition: transform .06s, background .1s; touch-action: manipulation;
  }
  button.op:active { transform: scale(.97); background: rgba(0,255,65,.25); }
  button.op.danger { border-color: var(--r); color: var(--r); text-shadow: 0 0 6px var(--r); }
  button.op.live { background: rgba(60,0,0,.7); box-shadow: 0 0 16px rgba(255,34,34,.5) inset; animation: pulse 1s infinite; }
  button.op.stop { background: #ffcc00; color: #000; border-color: #ffcc00; text-shadow: none; box-shadow: 0 0 14px rgba(255,204,0,.5); }
  button.op.stop:active { background: #fff; }
  @keyframes pulse { 50% { box-shadow: 0 0 24px rgba(255,34,34,.85) inset; } }
  #voicesel {
    width: 100%; background: #000; border: 1px solid var(--g); color: var(--g);
    font-family: inherit; font-size: 13px; padding: 12px; border-radius: 6px;
    text-shadow: 0 0 5px var(--g); -webkit-appearance: none; appearance: none;
  }
  #charrow { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  #sillyrow { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
  #sayings { display: grid; gap: 6px; max-height: 240px; overflow-y: auto; padding: 6px; border: 1px solid var(--gd); border-radius: 6px; }
  button.op.say { padding: 10px 12px; font-size: 12px; font-weight: normal; text-align: left; }
  #victim, #customsay {
    width: 100%; background: #000; border: 1px solid var(--g); color: var(--g);
    font-family: inherit; font-size: 14px; padding: 12px; border-radius: 6px;
    text-align: center; text-shadow: 0 0 5px var(--g);
  }
  #victim::placeholder, #customsay::placeholder { color: var(--gd); }
  .divider { text-align: center; color: var(--gd); font-size: 11px; letter-spacing: 1px; margin: 2px 0; }
  button.op.sm { padding: 11px 4px; font-size: 13px; }
  button.op.sm.active { background: rgba(0,255,65,.32); box-shadow: 0 0 14px rgba(0,255,65,.55) inset; }
  #voicehint { font-size: 11px; color: var(--gd); text-align: center; margin: -2px 0 2px; }
  .barwrap { margin: 4px 0; }
  .bar { height: 12px; border: 1px solid var(--gd); background: #001a06; overflow: hidden; }
  .bar > i { display: block; height: 100%; width: 0; background: var(--g); box-shadow: 0 0 10px var(--g); }
  #term::-webkit-scrollbar { width: 4px; }
  #term::-webkit-scrollbar-thumb { background: var(--gd); }
</style>

<canvas id="matrix"></canvas>
<div class="scan"></div>

<div id="app">
  <header>
    <span class="dot"></span>
    <span>root@darknet:~#</span>
    <span class="sep"></span>
    <span id="clock" class="dim">--:--:--</span>
  </header>

  <div id="term"></div>

  <div id="pad">
    <input id="victim" type="text" placeholder="👤 type their name (like your cousin!)" autocomplete="off" spellcheck="false">
    <div id="charrow">
      <button class="op sm active" data-char="robot">🤖 ROBOT</button>
      <button class="op sm" data-char="monster">👹 MONSTER</button>
      <button class="op sm" data-char="chipmunk">🐿️ CHIPMUNK</button>
      <button class="op sm" data-char="fancy">🎩 FANCY</button>
    </div>
    <select id="voicesel"><option>loading voices…</option></select>
    <div id="voicehint">tap a character voice — each sounds different 🔊 (or pick your own from the menu)</div>

    <div class="divider">😎 HOW SILLY SHOULD IT BE?</div>
    <div id="sillyrow">
      <button class="op sm active" data-silly="cool">😎 COOL</button>
      <button class="op sm" data-silly="medium">😏 MEDIUM</button>
      <button class="op sm" data-silly="silly">🤪 SILLY</button>
    </div>

    <div class="divider">— 1) LET THE HACKER TALK BY ITSELF —</div>
    <button class="op" data-voice="talk">🎙️ HACKER VOICE — talk to them</button>
    <button class="op danger" data-voice="nonstop">🔴 NON-STOP MODE — keeps talking</button>
    <button class="op stop" data-voice="stop">✋ STOP — make it be quiet</button>

    <div class="divider">— 2) OR TYPE YOUR OWN MESSAGE —</div>
    <input id="customsay" type="text" placeholder="✍️ type anything and it will say it..." autocomplete="off" spellcheck="false">
    <button class="op" data-voice="custom">🗣️ MAKE IT SAY THIS</button>

    <div class="divider">— 3) SEE WHAT IT CAN SAY —</div>
    <button class="op" data-toggle="sayings">📜 SEE EVERYTHING IT CAN SAY</button>
    <div id="sayings" style="display:none"></div>
  </div>
</div>

<script>
(function () {
  "use strict";
  var term = document.getElementById("term");
  var pad = document.getElementById("pad");

  /* ---------- sound (Web Audio, no files needed) ---------- */
  var AC = window.AudioContext || window.webkitAudioContext;
  var ac = null;
  function audio() { if (!ac && AC) { try { ac = new AC(); } catch (e) {} } if (ac && ac.state === "suspended") ac.resume(); return ac; }
  function beep(freq, dur, type, vol) {
    var c = audio(); if (!c) return;
    var o = c.createOscillator(), g = c.createGain();
    o.type = type || "square"; o.frequency.value = freq;
    g.gain.value = vol == null ? 0.06 : vol;
    o.connect(g); g.connect(c.destination);
    var t = c.currentTime; o.start(t);
    g.gain.setValueAtTime(g.gain.value, t);
    g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
    o.stop(t + dur);
  }
  function buzz(ms) { if (navigator.vibrate) { try { navigator.vibrate(ms); } catch (e) {} } }
  function rnd(n) { return Math.floor(Math.random() * n); }
  function pick(a) { return a[rnd(a.length)]; }

  var rainColor = "#00ff41";

  /* ---------- creepy VOICE (Web Speech / phone's built-in text-to-speech) ---------- */
  var synth = window.speechSynthesis || null;
  var VOICES = [];
  var chosenVoice = null;   // the voice the user picked (null = auto-pick one)
  var chosenPitch = 0.2;    // set by the character presets below
  var chosenRate = 0.55;    // set by the character presets below
  var charInited = false;
  function loadVoices() { try { VOICES = synth ? synth.getVoices() : []; } catch (e) { VOICES = []; } populateVoiceSelect(); }
  if (synth) {
    loadVoices();
    try { synth.onvoiceschanged = loadVoices; } catch (e) {}
    // Chrome desktop stalls long speech queues; nudge it to keep going
    setInterval(function () { try { if (synth.speaking) synth.resume(); } catch (e) {} }, 7000);
  }
  function pickVoice() {
    if (!VOICES.length) loadVoices();
    var en = VOICES.filter(function (v) { return /en[-_]/i.test(v.lang || ""); });
    var deep = en.filter(function (v) { return /(male|daniel|arthur|fred|rocko|grandpa|uk english male|reed|albert|aaron)/i.test(v.name || ""); });
    return deep[0] || en[0] || VOICES[0] || null;
  }
  function clean(t) { return String(t).replace(/[^\x00-\x7F]+/g, " ").replace(/\s+/g, " ").trim(); }

  // fill the dropdown with the voices this phone actually has (English ones first)
  function populateVoiceSelect() {
    var sel = document.getElementById("voicesel");
    if (!sel) return;
    if (!VOICES.length) { sel.innerHTML = "<option>no voices found on this device</option>"; return; }
    var list = VOICES.slice().sort(function (a, b) {
      var ae = /en/i.test(a.lang || "") ? 0 : 1, be = /en/i.test(b.lang || "") ? 0 : 1;
      if (ae !== be) return ae - be;
      return (a.name || "").localeCompare(b.name || "");
    });
    if (!charInited) { charInited = true; applyChar("robot"); }
    if (!chosenVoice) chosenVoice = pickVoice();
    var curName = chosenVoice ? chosenVoice.name : "";
    sel.innerHTML = "";
    list.forEach(function (v) {
      var o = document.createElement("option");
      o.value = v.name; o.textContent = v.name + " (" + v.lang + ")";
      if (v.name === curName) o.selected = true;
      sel.appendChild(o);
    });
  }
  function sample() { stopSpeak(); say("I am a hacker. I am inside your phone now."); }

  // Character voices: each picks a DIFFERENT device voice + its own pitch/rate,
  // so they sound like completely different people. Voice names vary by phone,
  // so we try a list of likely names and fall back to any available voice.
  var CHARACTERS = {
    robot:    { pitch: 0.2, rate: 0.55, names: ["fred", "albert", "aaron", "eddy", "google us english"] },
    monster:  { pitch: 0.1, rate: 0.7,  names: ["daniel", "rishi", "reed", "aaron", "male", "arthur"] },
    chipmunk: { pitch: 2.0, rate: 1.4,  names: ["samantha", "karen", "tessa", "nicky", "female", "google uk english female"] },
    fancy:    { pitch: 1.0, rate: 0.9,  names: ["daniel", "arthur", "kate", "serena", "martha", "google uk english"] }
  };
  function applyChar(key) {
    var c = CHARACTERS[key]; if (!c) return;
    chosenPitch = c.pitch; chosenRate = c.rate;
    if (!VOICES.length) loadVoices();
    var en = VOICES.filter(function (v) { return /en/i.test(v.lang || ""); });
    var pool = en.length ? en : VOICES;
    var found = null;
    for (var i = 0; i < c.names.length && !found; i++) {
      var needle = c.names[i];
      found = pool.filter(function (v) { return (v.name || "").toLowerCase().indexOf(needle) >= 0; })[0];
    }
    chosenVoice = found || pool[0] || null;
    var sel = document.getElementById("voicesel");
    if (sel && chosenVoice) sel.value = chosenVoice.name;
  }

  // Unlock speech: MUST be called inside a real tap. Speaks a tiny silent utterance
  // so mobile browsers (esp. iPhone) allow the real lines that follow.
  var unlocked = false;
  function unlockSpeech() {
    if (unlocked || !synth) return;
    try { var u = new SpeechSynthesisUtterance(" "); u.volume = 0; synth.speak(u); } catch (e) {}
    unlocked = true;
    // iOS often only fills the voice list AFTER the first speech — reload a few times
    setTimeout(loadVoices, 250); setTimeout(loadVoices, 900); setTimeout(loadVoices, 2000);
  }

  // has the voice ever actually made sound? used to warn about the mute switch
  var spokeOnce = false, soundWarned = false;
  function warnNoSound() {
    if (soundWarned) return; soundWarned = true;
    setTimeout(function () {
      if (spokeOnce) return; // we heard it — all good
      line("", null);
      line("🔈 CAN'T HEAR THE VOICE?", "warn");
      line("  1) Flip the SILENT switch on the LEFT side of your iPhone", "warn");
      line("     (if you see ORANGE, it is muted — push it so the orange hides)", "warn");
      line("  2) Press the VOLUME UP button on the side a few times", "warn");
      line("  3) Then tap a voice button again 🎙️", "warn");
      line("", null);
    }, 1900);
  }

  // speak one line in a slow, deep, creepy voice; resolves when it finishes
  function say(text) {
    return new Promise(function (res) {
      if (!synth) {
        if (!soundWarned) { soundWarned = true; line("⚠ this browser can't do voices — open it in Safari.", "warn"); }
        res(); return;
      }
      var msg = clean(text);
      if (!msg) { res(); return; }
      var done = false; function fin() { if (!done) { done = true; res(); } }
      try {
        var u = new SpeechSynthesisUtterance(msg);
        var v = chosenVoice || pickVoice(); if (v) u.voice = v;
        u.pitch = chosenPitch; u.rate = chosenRate; u.volume = 1;
        u.onstart = function () { spokeOnce = true; };
        u.onend = fin; u.onerror = fin;
        synth.speak(u);
        warnNoSound(); // if nothing is heard shortly, tell them about the mute switch
        // safety: never hang forever if the browser drops the 'end' event
        setTimeout(fin, Math.max(4000, msg.length * 140));
      } catch (e) { fin(); }
    });
  }
  function stopSpeak() { try { if (synth) synth.cancel(); } catch (e) {} }

  /* ---------- terminal printing ---------- */
  var cursorEl = null;
  function scroll() { term.scrollTop = term.scrollHeight; }
  function ensureCursor() {
    if (!cursorEl) { cursorEl = document.createElement("span"); cursorEl.className = "cursor"; }
    term.appendChild(cursorEl);
  }
  function line(text, cls) {
    if (cursorEl && cursorEl.parentNode) cursorEl.parentNode.removeChild(cursorEl);
    var d = document.createElement("div");
    if (cls) d.className = cls;
    d.textContent = text;
    term.appendChild(d);
    ensureCursor(); scroll();
    return d;
  }
  function type(text, cls) {
    return new Promise(function (res) {
      if (cursorEl && cursorEl.parentNode) cursorEl.parentNode.removeChild(cursorEl);
      var d = document.createElement("div"); if (cls) d.className = cls;
      term.appendChild(d); ensureCursor();
      var i = 0;
      (function step() {
        if (i < text.length) {
          d.textContent += text.charAt(i++);
          if (i % 2 === 0) beep(1200 + Math.random() * 400, 0.02, "square", 0.02);
          scroll();
          setTimeout(step, 14 + Math.random() * 22);
        } else res(d);
      })();
    });
  }
  function wait(ms) { return new Promise(function (r) { setTimeout(r, ms); }); }

  function progress(label, ms) {
    return new Promise(function (res) {
      line(label, "dim");
      var wrap = document.createElement("div"); wrap.className = "barwrap";
      var bar = document.createElement("div"); bar.className = "bar";
      var fill = document.createElement("i"); bar.appendChild(fill); wrap.appendChild(bar);
      if (cursorEl && cursorEl.parentNode) cursorEl.parentNode.removeChild(cursorEl);
      term.appendChild(wrap); ensureCursor(); scroll();
      var start = Date.now();
      (function step() {
        var p = Math.min(1, (Date.now() - start) / ms);
        fill.style.width = (p * 100).toFixed(0) + "%";
        if (Math.random() < 0.3) beep(400 + Math.random() * 900, 0.02, "sawtooth", 0.025);
        scroll();
        if (p < 1) requestAnimationFrame(step);
        else { line("[ " + label.replace(/\.\.\.$/, "") + " ] COMPLETE", "ok"); res(); }
      })();
    });
  }
  function ip() { return (10 + rnd(240)) + "." + rnd(255) + "." + rnd(255) + "." + rnd(255); }

  /* ================= TALKING FEATURES ================= */

  // Big pool of SILLY lines. {name} gets swapped for the name you typed (or a
  // goofy default). Shuffled every time so it is never the exact same speech.
  var POOL_COOL = [
    "I am already inside this phone.",
    "I got past your lock screen in two seconds flat.",
    "I can see everything on this screen right now.",
    "I copied every photo on this device.",
    "I am reading your messages as we speak.",
    "Your passwords are already mine.",
    "I control the camera and the microphone.",
    "I rerouted your data through twelve countries.",
    "I move through this network like a shadow.",
    "Every tap you make, I see it.",
    "I cracked this phone in under a minute. Too easy.",
    "Nothing on this device is hidden from me.",
    "I have been in your system for three days.",
    "I left no trace. You will never know how.",
    "I am always three steps ahead of you.",
    "This phone answers to me now.",
    "I disabled your firewall before you even noticed.",
    "I am downloading everything as we speak.",
    "Your security was a joke. I walked right in.",
    "I am the reason your battery keeps dying.",
    "Consider this phone officially hacked.",
    "I own this device now. All of it.",
    "I slipped past every lock on this phone.",
    "I have full access. Every app, every file.",
    // lines that use the name you type:
    "{name}. I know everything on this phone now.",
    "Hello {name}. Your phone belongs to me.",
    "Nice try locking me out, {name}. It did not work.",
    "I found my way in, {name}. Too easy.",
    "{name}, your data is mine now.",
    "Access granted. Welcome to your problem, {name}."
  ];

  // the silly set
  var POOL_SILLY = [
    "A super duper silly hacker.",
    "I broke into this phone to steal all the snacks.",
    "I can see your screen. It is very smudgy. Please clean it.",
    "I hacked the camera. Wow. Nice face. Ten out of ten.",
    "I changed your ringtone to a duck quacking. You are welcome.",
    "I replaced all your emojis with tiny potatoes.",
    "I am the boss of this phone now. My first rule is more naps.",
    "I ordered nine hundred pizzas to your fridge.",
    "I am a genius hacker. Also, I am a little hungry.",
    "I renamed your wifi to Hacked By A Potato.",
    "I put googly eyes on all your apps.",
    "I know your password. It is probably password. Classic.",
    "Every phone in this house owes me a taco.",
    "I hacked your alarm. It now says wakey wakey, silly goose.",
    "Beep boop. I am a very professional hacker. And also a clown.",
    "I taught your phone how to burp. You are welcome.",
    "I filled your notes app with pictures of spaghetti.",
    "I set your keyboard to only type the word banana.",
    "I hid a tiny robot inside your charger. His name is Kevin.",
    "{name}, I ate all your snacks. Every single one.",
    "Nice haircut, {name}. Did a raccoon do it?",
    "Hello {name}. Yes, I can see you. Wave hello.",
    "Hey {name}, I turned all your apps upside down. Enjoy."
  ];

  // silliness level the user picks: "cool", "medium" (a mix), or "silly"
  var sillyLevel = "cool";
  function currentPool() {
    if (sillyLevel === "silly") return POOL_SILLY;
    if (sillyLevel === "medium") return POOL_COOL.concat(POOL_SILLY);
    return POOL_COOL;
  }
  // random opening + ending so it is different every time
  function greeting() {
    return pick(["I am a hacker.", "You have been hacked.", "I am already in your phone.",
      "Access granted.", "Well, well, well. A new phone to break into.", "Guess who is in your phone."]);
  }
  function outroLine() {
    if (sillyLevel === "silly") return pick(["Beep boop. You have been pranked.", "Ha! Pranked.", "That is all. Enjoy the potatoes."]);
    if (sillyLevel === "medium") return pick(["Ha. You have been pranked.", "Consider yourself pranked.", "Too easy. Goodbye."]);
    return pick(["Consider yourself hacked.", "I am gone. You will never find me.", "Hack complete. Goodbye."]);
  }

  // whose name to use (typed in the box, or a silly default)
  function who() { var el = document.getElementById("victim"); var v = el ? el.value.trim() : ""; return v || "silly goose"; }
  function fill(s) { return String(s).replace(/\{name\}/g, who()); }
  function shuffle(a) { a = a.slice(); for (var i = a.length - 1; i > 0; i--) { var j = rnd(i + 1); var t = a[i]; a[i] = a[j]; a[j] = t; } return a; }

  // Every action bumps this "generation". A running talk/non-stop stops itself
  // as soon as the generation changes, so the buttons are NEVER locked — a new
  // tap just interrupts the old one.
  var gen = 0;
  function stopAll() {
    gen++;
    live = false;
    if (liveTimer) { clearTimeout(liveTimer); liveTimer = null; }
    stopSpeak();
    var nb = pad.querySelector('button[data-voice="nonstop"]');
    if (nb) { nb.textContent = "🔴 NON-STOP MODE — keeps talking"; nb.classList.remove("live"); }
  }

  // HACKER VOICE: speak the whole monologue. First line fires immediately on the
  // tap (so mobile allows it); the rest chain on each line finishing.
  function talk() {
    stopAll();
    var myGen = gen;
    line("");
    line("> voice online. listen carefully...", "cmd");
    // built fresh each time: greeting + random jokes + ending -> never the same
    var n = 7 + rnd(3); // 7, 8, or 9 random lines each time
    var seq = [greeting()].concat(shuffle(currentPool()).slice(0, n)).concat([outroLine()]);
    var i = 0;
    (function next() {
      if (myGen !== gen) return;               // another button was tapped -> stop
      if (i >= seq.length) { line("> ...transmission ended.", "ok"); line(""); return; }
      var s = fill(seq[i++]);
      line('  "' + s + '"', "bad");
      buzz(30); beep(120, 0.06, "sawtooth", 0.05);
      say(s).then(function () { if (myGen === gen) setTimeout(next, 160); });
    })();
  }

  // NON-STOP MODE: keeps speaking random lines with a short gap, until toggled off.
  // TYPE-YOUR-OWN: speak exactly what the user typed in the box
  function customTalk() {
    var el = document.getElementById("customsay");
    var txt = el ? el.value.trim() : "";
    if (!txt) { line(""); line("> type a message in the box first! ✍️", "warn"); line(""); return; }
    stopAll();   // interrupt anything so this ALWAYS works, even mid-speech
    line("");
    line('  "' + fill(txt) + '"', "bad");
    buzz(30); beep(120, 0.06, "sawtooth", 0.05);
    say(txt);
    line("> ...said it.", "ok"); line("");
  }

  var live = false, liveTimer = null;
  function startLive(btn) {
    stopAll();
    live = true; var myGen = gen;
    btn.textContent = "🛑 STOP TALKING";
    btn.classList.add("live");
    line("");
    line("> NON-STOP MODE ON. the hacker will keep talking. tap to stop.", "bad");
    (function loop() {
      if (!live || myGen !== gen) return;
      var s = fill(pick(currentPool()));
      line('  "' + s + '"', "bad");
      buzz(30); beep(120, 0.06, "sawtooth", 0.05);
      say(s).then(function () {
        if (!live || myGen !== gen) return;
        liveTimer = setTimeout(loop, 2500 + rnd(4000)); // short gap, then next line
      });
    })();
  }
  function stopLive() {
    stopAll();
    line("> the hacker goes quiet... for now.", "ok"); line("");
  }

  function onPadTap(e) {
    var t = e.target;
    var b = (t && t.closest) ? t.closest("button.op") : null;
    if (!b) return;
    // these run inside the real tap so phones allow the voice to play
    audio(); unlockSpeech(); buzz(25);

    var tg = b.getAttribute("data-toggle");
    if (tg === "sayings") {
      var box = document.getElementById("sayings");
      if (box.style.display === "none" || !box.style.display) {
        buildSayings(); box.style.display = "grid"; b.textContent = "📜 HIDE THE LIST";
      } else { box.style.display = "none"; b.textContent = "📜 SEE EVERYTHING IT CAN SAY"; }
      return;
    }
    var si = b.getAttribute("data-sayidx");
    if (si !== null && si !== undefined) {
      stopAll();
      var line1 = fill(currentPool()[parseInt(si, 10)] || "");
      line(""); line('  "' + line1 + '"', "bad"); buzz(30); beep(120, 0.06, "sawtooth", 0.05);
      say(line1);
      return;
    }

    var sl = b.getAttribute("data-silly");
    if (sl) {
      sillyLevel = sl;
      var slb = pad.querySelectorAll("button[data-silly]");
      for (var k = 0; k < slb.length; k++) slb[k].classList.remove("active");
      b.classList.add("active");
      var sbox = document.getElementById("sayings");
      if (sbox && sbox.style.display === "grid") buildSayings(); // refresh open list
      line("> silliness set to " + b.textContent.trim(), "ok");
      return;
    }
    var ch = b.getAttribute("data-char");
    if (ch) {
      applyChar(ch);
      var cbtns = pad.querySelectorAll("button[data-char]");
      for (var i = 0; i < cbtns.length; i++) cbtns[i].classList.remove("active");
      b.classList.add("active");
      line("> voice changed to " + b.textContent.trim() + " — listen!", "ok");
      sample();
      return;
    }
    var vc = b.getAttribute("data-voice");
    if (vc === "stop") { stopAll(); line("> ok, the hacker is quiet now. 🤫", "ok"); line(""); }
    else if (vc === "talk") { talk(); }
    else if (vc === "nonstop") { live ? stopLive(b) : startLive(b); }
    else if (vc === "custom") { customTalk(); }
  }
  // Bind BOTH click and touch so taps always register on iPhones. touchend
  // fires first and cancels the follow-up click so it never double-runs.
  pad.addEventListener("click", onPadTap);
  pad.addEventListener("touchend", function (e) {
    var t = e.target;
    if (t && t.closest && t.closest("button.op")) { e.preventDefault(); onPadTap(e); }
  }, { passive: false });

  // build the "everything it can say" list (each line is tappable to speak it)
  function buildSayings() {
    var box = document.getElementById("sayings");
    if (!box) return;
    box.innerHTML = "";
    var tip = document.createElement("div"); tip.className = "divider"; tip.textContent = "👇 tap any line to make it say that one";
    box.appendChild(tip);
    var lines = currentPool();
    for (var i = 0; i < lines.length; i++) {
      var btn = document.createElement("button");
      btn.className = "op say"; btn.setAttribute("data-sayidx", i);
      btn.textContent = fill(lines[i]);
      box.appendChild(btn);
    }
  }

  // change the voice from the dropdown (plays a sample so you can hear it)
  var voicesel = document.getElementById("voicesel");
  if (voicesel) voicesel.addEventListener("change", function () {
    audio(); unlockSpeech();
    var v = VOICES.filter(function (x) { return x.name === voicesel.value; })[0];
    if (v) { chosenVoice = v; sample(); }
  });

  // press Return/Go on the keyboard to make it say your typed message
  var customInput = document.getElementById("customsay");
  if (customInput) customInput.addEventListener("keydown", function (e) {
    if (e.key === "Enter" || e.keyCode === 13) {
      e.preventDefault(); customInput.blur();
      audio(); unlockSpeech(); buzz(25);
      customTalk();
    }
  });

  /* ---------- clock ---------- */
  setInterval(function () {
    var d = new Date();
    function p(n) { return (n < 10 ? "0" : "") + n; }
    document.getElementById("clock").textContent = p(d.getHours()) + ":" + p(d.getMinutes()) + ":" + p(d.getSeconds());
  }, 1000);

  /* ---------- matrix rain ---------- */
  var cv = document.getElementById("matrix"), cx = cv.getContext("2d");
  var chars = "アイウエオカキクケコ0123456789ABCDEF@#$%".split("");
  var cols, drops, fs = 14;
  function resize() {
    cv.width = window.innerWidth; cv.height = window.innerHeight;
    cols = Math.floor(cv.width / fs); drops = [];
    for (var i = 0; i < cols; i++) drops[i] = Math.random() * cv.height / fs;
  }
  window.addEventListener("resize", resize); resize();
  function rain() {
    cx.fillStyle = "rgba(0,0,0,0.08)"; cx.fillRect(0, 0, cv.width, cv.height);
    cx.fillStyle = rainColor; cx.font = fs + "px monospace";
    for (var i = 0; i < drops.length; i++) {
      cx.fillText(chars[rnd(chars.length)], i * fs, drops[i] * fs);
      if (drops[i] * fs > cv.height && Math.random() > 0.975) drops[i] = 0;
      drops[i]++;
    }
    requestAnimationFrame(rain);
  }
  rain();

  /* ---------- intro ---------- */
  async function intro() {
    await type("root@darknet:~# ./h4ck3r --start", "cmd");
    await wait(200);
    line("╔══════════════════════════════════╗", "ok");
    line("║   ELITE H4CK3R TERMINAL v3.7.1   ║", "ok");
    line("║   >> TOP SECRET  //  DO NOT USE   ║", "warn");
    line("╚══════════════════════════════════╝", "ok");
    await wait(150);
    await progress("BOOTING KERNEL...", 800);
    await progress("CONNECTING TO DARKNET...", 1000);
    line("  connected via " + ip() + " [stealth mode]", "dim");
    line("", null);
    line("> tap 🎙️ HACKER VOICE and the hacker will start talking out loud.", "warn");
    line("> tap 🔴 NON-STOP MODE to make it keep talking on its own.", "warn");
    line("> turn the phone volume UP! 🔊", "warn");
    line("", null);
  }

  // boot on first tap so audio + voice are allowed to play
  var started = false;
  function boot() { if (started) return; started = true; audio(); unlockSpeech(); intro();
    setTimeout(loadVoices, 400); setTimeout(loadVoices, 1500); setTimeout(loadVoices, 3000); }
  document.addEventListener("touchstart", boot, { once: true });
  document.addEventListener("click", boot, { once: true });
  setTimeout(function () { if (!started) { started = true; intro(); } }, 1200);
})();
</script>
